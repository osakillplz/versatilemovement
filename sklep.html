<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo-kolko.png">
  <link rel="apple-touch-icon" href="logo-kolko.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sklep — Wkrótce | Versatile Movement</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;900&family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #EDEAE0;
      --black: #0A0A0A;
      --white: #FAFAF7;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'Nunito Sans', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--black);
      color: var(--cream);
      font-family: var(--font-body);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('Equipment.webp') center center / cover no-repeat;
      filter: grayscale(30%);
      transform: scale(1.04);
      animation: slowzoom 18s ease-in-out infinite alternate;
    }

    @keyframes slowzoom {
      from { transform: scale(1.04); }
      to   { transform: scale(1.10); }
    }

    .overlay { position: fixed; inset: 0; }
    .overlay-1 {
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(10,10,10,0.97) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 20% 0%, rgba(10,10,10,0.6) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 0%, rgba(10,10,10,0.5) 0%, transparent 60%);
    }
    .overlay-2 { background: rgba(10,10,10,0.42); }

    .page {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(24px, 4vw, 48px) clamp(24px, 6vw, 72px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      height: 56px;
      width: auto;
      opacity: 0.95;
      filter: brightness(1.1);
    }

    .back-link {
      font-family: var(--font-mono);
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: 0.12em;
      color: rgba(237,234,224,0.55);
      text-decoration: none;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s ease;
    }
    .back-link:hover { color: var(--cream); }
    .back-link::before { content: '←'; font-size: 1.1em; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 4vh;
      padding-top: 6vh;
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: clamp(10px, 1.3vw, 13px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(237,234,224,0.45);
      margin-bottom: clamp(12px, 2vw, 20px);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeup 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
    }

    .headline {
      font-family: var(--font-display);
      font-size: clamp(72px, 14vw, 180px);
      line-height: 0.9;
      letter-spacing: -0.01em;
      color: var(--cream);
      overflow: hidden;
    }

    .headline-line {
      display: block;
      opacity: 0;
      transform: translateY(110%);
    }
    .headline-line:nth-child(1) { animation: slideup 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s forwards; }
    .headline-line:nth-child(2) {
      animation: slideup 0.9s cubic-bezier(0.22,1,0.36,1) 0.65s forwards;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(237,234,224,0.35);
    }

    .tagline {
      margin-top: clamp(20px, 3vw, 36px);
      font-family: var(--font-body);
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 300;
      line-height: 1.7;
      color: rgba(237,234,224,0.6);
      max-width: 480px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeup 0.8s cubic-bezier(0.22,1,0.36,1) 0.9s forwards;
    }

    .divider {
      width: 0;
      height: 1px;
      background: rgba(237,234,224,0.2);
      margin: clamp(24px, 3vw, 36px) 0;
      animation: expandline 1s cubic-bezier(0.22,1,0.36,1) 1.1s forwards;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeup 0.8s cubic-bezier(0.22,1,0.36,1) 1.2s forwards;
    }

    .notify-label {
      font-family: var(--font-mono);
      font-size: clamp(10px, 1.1vw, 12px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(237,234,224,0.4);
      margin-bottom: 10px;
    }

    .notify-form { display: flex; gap: 0; }

    .notify-input {
      background: rgba(237,234,224,0.06);
      border: 1px solid rgba(237,234,224,0.15);
      border-right: none;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 12px 18px;
      width: clamp(180px, 22vw, 280px);
      outline: none;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .notify-input::placeholder { color: rgba(237,234,224,0.3); }
    .notify-input:focus {
      border-color: rgba(237,234,224,0.4);
      background: rgba(237,234,224,0.09);
    }

    .notify-btn {
      background: var(--cream);
      color: var(--black);
      border: 1px solid var(--cream);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
      white-space: nowrap;
    }
    .notify-btn:hover { background: transparent; color: var(--cream); }
    .notify-btn:active { opacity: 0.8; }

    .socials { display: flex; gap: 20px; align-items: center; }

    .social-link {
      font-family: var(--font-mono);
      font-size: clamp(10px, 1.1vw, 12px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(237,234,224,0.4);
      text-decoration: none;
      transition: color 0.25s ease;
      position: relative;
    }
    .social-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--cream);
      transition: width 0.3s ease;
    }
    .social-link:hover { color: var(--cream); }
    .social-link:hover::after { width: 100%; }

    .progress-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(237,234,224,0.08);
      z-index: 20;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(237,234,224,0.5), var(--cream));
      animation: progress 3.5s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
      width: 0;
    }

    .dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(237,234,224,0.2);
      animation: floatdot 8s ease-in-out infinite;
    }
    .dot:nth-child(1) { top: 20%; right: 12%; animation-delay: 0s; }
    .dot:nth-child(2) { top: 35%; right: 8%;  animation-delay: 2.5s; width: 3px; height: 3px; }
    .dot:nth-child(3) { top: 55%; right: 18%; animation-delay: 5s;   width: 4px; height: 4px; }

    @keyframes floatdot {
      0%, 100% { transform: translateY(0); opacity: 0.2; }
      50%       { transform: translateY(-18px); opacity: 0.5; }
    }
    @keyframes fadeup  { to { opacity: 1; transform: translateY(0); } }
    @keyframes slideup { to { opacity: 1; transform: translateY(0); } }
    @keyframes expandline { to { width: clamp(60px, 8vw, 120px); } }
    @keyframes progress   { to { width: 72%; } }

    @media (max-width: 600px) {
      html, body { overflow: auto; }
      .page { padding: 24px 20px; min-height: 100vh; }
      .headline-line:nth-child(2) { -webkit-text-stroke-width: 1px; }
      .bottom-row { flex-direction: column; align-items: flex-start; gap: 32px; }
      .notify-input { width: 100%; }
      .notify-form { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>

  <div class="bg"></div>
  <div class="overlay overlay-2"></div>
  <div class="overlay overlay-1"></div>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <div class="page">

    <div class="top-bar">
      <a href="/" class="logo">
        <img src="VersatileMovement_logo1_png.webp" alt="Versatile Movement">
      </a>
      <a href="/" class="back-link">Wróć do strony</a>
    </div>

    <div class="main">
      <span class="eyebrow">Versatile Movement — Sklep</span>
      <h1 class="headline">
        <span class="headline-line">WKRÓTCE</span>
        <span class="headline-line">ONLINE</span>
      </h1>
      <p class="tagline">
        Przygotowujemy coś wyjątkowego. Sprzęt, odzież i akcesoria do treningu siłowo-kondycyjnego — wszystko w jednym miejscu.
      </p>

      <div class="divider"></div>

      <div class="bottom-row">
        <div>
          <p class="notify-label">Powiadom mnie o otwarciu</p>
          <div class="notify-form">
            <input class="notify-input" type="email" placeholder="twój@email.pl">
            <button class="notify-btn">Zapisz się</button>
          </div>
        </div>

        <div class="socials">
          <a href="https://www.instagram.com/versatile.movement/" target="_blank" class="social-link">Instagram</a>
          <a href="https://www.facebook.com/bournemouthcalisthenics/" target="_blank" class="social-link">Facebook</a>
          <a href="https://www.youtube.com/@versatilemovement993" target="_blank" class="social-link">YouTube</a>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
